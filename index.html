<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale</title>
    <meta name="theme-color" content="#050807" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="landing">
    <main id="app">
      <h1>TimerRoyale</h1>
      <p class="subtitle">Land on the target — blind.</p>

      <div id="menu" class="menu">
        <button id="solo-btn" class="join-btn menu-btn" type="button">Single Player</button>
        <a id="host-link" class="join-btn menu-btn menu-btn-alt" href="/host.html">Host a Game</a>
      </div>

      <section id="solo-panel" class="game-panel" hidden aria-label="Single player">
        <p id="solo-round" class="players-label">Round 1 / 5</p>
        <div class="target-row">
          <div class="target-cell">
            <p class="target-label">Target</p>
            <p id="solo-target" class="timer-digits solo-digits">--<span class="timer-unit">s</span></p>
          </div>
          <div class="target-cell">
            <p class="target-label">You</p>
            <p id="solo-you" class="timer-digits solo-digits dim">--<span class="timer-unit">s</span></p>
          </div>
        </div>
        <div class="score-wrap">
          <p class="target-label">Total off</p>
          <p id="solo-score" class="timer-digits solo-score">0<span class="timer-unit">ms</span></p>
        </div>
        <p id="solo-diff-anchor" class="solo-diff-anchor"></p>
        <button id="solo-big" class="big-btn" type="button">
          <span id="solo-big-label">TAP TO START</span>
        </button>
        <p id="solo-msg" class="game-msg"></p>
        <ul id="solo-results" class="round-rows"></ul>
        <p id="solo-total" class="solo-total" hidden></p>
        <div class="menu">
          <button id="solo-again" class="join-btn" type="button" hidden>Play again</button>
          <button id="solo-exit" class="join-btn menu-btn-alt" type="button" hidden>Menu</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/landing.js"></script>
  </body>
</html>
