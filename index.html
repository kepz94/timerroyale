<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale</title>
    <meta name="theme-color" content="#050807" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="landing">
    <main id="app">
      <h1>TimerRoyale</h1>
      <p class="subtitle">Land on the target — blind.</p>

      <div id="menu" class="menu">
        <button id="solo-btn" class="join-btn menu-btn" type="button">Single Player</button>
        <button id="daily-btn" class="join-btn menu-btn" type="button">Daily Royale</button>
        <button id="guess-solo-btn" class="join-btn menu-btn" type="button">Guess Timer</button>
        <button id="join-game-btn" class="join-btn menu-btn menu-btn-alt" type="button">Join a Game</button>
        <a id="host-link" class="join-btn menu-btn menu-btn-alt" href="/host.html">Host a Game</a>
      </div>

      <form id="join-code-form" class="join-form" hidden>
        <label for="code-input" class="join-label">Room code (on the TV)</label>
        <input id="code-input" class="name-input code-input" type="text" maxlength="4"
               autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="ABCD" />
        <button class="join-btn" type="submit">Join</button>
        <p id="code-error" class="join-error" role="alert"></p>
      </form>

      <section id="solo-panel" class="game-panel" hidden aria-label="Single player">
        <p id="solo-round" class="players-label">Round 1 / 5</p>
        <p id="final-score" class="timer-digits final-score" hidden></p>
        <div class="target-row">
          <div class="target-cell">
            <p class="target-label">Target</p>
            <p id="solo-target" class="timer-digits solo-digits">--<span class="timer-unit">s</span></p>
          </div>
          <div class="target-cell">
            <p class="target-label">You</p>
            <p id="solo-you" class="timer-digits solo-digits dim">--<span class="timer-unit">s</span></p>
          </div>
        </div>
        <div class="score-wrap">
          <p class="target-label">Total off</p>
          <p id="solo-score" class="timer-digits solo-score">0<span class="timer-unit">s</span></p>
        </div>
        <p id="solo-diff-anchor" class="solo-diff-anchor"></p>
        <button id="solo-big" class="big-btn" type="button">
          <span id="solo-big-label">TAP TO START</span>
        </button>
        <p id="solo-msg" class="game-msg"></p>
        <ul id="solo-results" class="round-rows"></ul>
        <p id="solo-total" class="solo-total" hidden></p>
        <form id="solo-guess-form" class="join-form guess-form" hidden>
          <label for="solo-guess-input" class="join-label">How long was it? (seconds)</label>
          <input id="solo-guess-input" class="name-input code-input" type="text" inputmode="decimal"
                 autocomplete="off" maxlength="5" placeholder="4.7" />
          <button id="solo-guess-submit" class="join-btn" type="submit">Lock it in</button>
          <p id="solo-guess-error" class="join-error" role="alert"></p>
        </form>
        <p id="daily-countdown" class="daily-countdown" hidden></p>
        <div class="menu">
          <button id="daily-share" class="join-btn" type="button" hidden>Share score card</button>
          <button id="solo-again" class="join-btn" type="button" hidden>Play again</button>
          <button id="solo-exit" class="join-btn menu-btn-alt" type="button" hidden>Menu</button>
        </div>
      </section>
    </main>
    <div id="flash" class="flash" aria-hidden="true"></div>
    <script type="module" src="/src/landing.js"></script>
  </body>
</html>
