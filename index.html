<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale — Host</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="host">
    <main id="app" class="lobby">
      <h1>TimerRoyale</h1>
      <p class="subtitle">Scan to join the game</p>

      <section class="join-panel" aria-label="How to join">
        <div class="qr-card">
          <canvas id="qr"></canvas>
        </div>
        <div class="room-info">
          <p class="room-label">Room code</p>
          <p id="room-code" class="room-code">····</p>
          <p id="join-url" class="join-url"></p>
        </div>
      </section>

      <section class="players-panel" aria-label="Players">
        <p class="players-label">Players</p>
        <ul id="player-list" class="player-list"></ul>
        <p id="players-empty" class="players-empty">No one has joined yet</p>
      </section>

      <section id="game-panel" class="game-panel" hidden aria-label="Game">
        <p id="match-banner" class="match-banner"></p>
        <p class="target-label">Target</p>
        <p id="target-digits" class="timer-digits">0.0<span class="timer-unit">s</span></p>
        <ul id="round-rows" class="round-rows"></ul>
        <ul id="standings" class="standings"></ul>
        <p id="game-msg" class="game-msg"></p>
      </section>

      <p id="status">Creating room…</p>
    </main>
    <script type="module" src="/src/host.js"></script>
  </body>
</html>
