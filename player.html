<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale — Player</title>
    <meta name="theme-color" content="#050807" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="player">
    <main id="app">
      <h1>TimerRoyale</h1>
      <p id="room-banner" class="subtitle"></p>

      <form id="join-form" class="join-form" hidden>
        <label for="name-input" class="join-label">Your name</label>
        <input id="name-input" class="name-input" type="text" maxlength="16"
               autocomplete="off" autocapitalize="words" placeholder="e.g. Kepu" />
        <label class="team-toggle"><input id="team-check" type="checkbox" />
          We're a team sharing this phone</label>
        <input id="members-input" class="name-input" type="text" maxlength="80" hidden
               autocomplete="off" autocapitalize="words" placeholder="Members: Alex, Blair, Casey" />
        <button id="join-btn" class="join-btn" type="submit">Join game</button>
        <p id="join-error" class="join-error" role="alert"></p>
      </form>

      <div id="joined-panel" class="joined-panel" hidden>
        <p id="joined-name" class="joined-name"></p>
        <p id="turn-banner" class="turn-banner"></p>
        <button id="big-btn" class="big-btn" type="button" aria-label="Press">
          <span id="big-btn-label">PRESS</span>
        </button>
        <label id="hard-toggle" class="team-toggle hard-toggle" hidden>
          <input id="hard-check" type="checkbox" /> 🔥 Hard mode — exact hit or nothing
        </label>
        <button id="start-btn" class="join-btn" type="button" hidden>Start round</button>
        <button id="rematch-btn" class="join-btn" type="button" hidden>Rematch</button>
        <button id="teams-btn" class="join-btn" type="button" hidden>Team match</button>
        <button id="koth-btn" class="join-btn" type="button" hidden>King of the Hill</button>
        <div id="koth-n" class="koth-n" hidden>
          <button class="join-btn koth-n-btn" data-n="3" type="button">First to 3</button>
          <button class="join-btn koth-n-btn" data-n="5" type="button">First to 5</button>
          <button class="join-btn koth-n-btn" data-n="7" type="button">First to 7</button>
        </div>
        <button id="share-btn" class="join-btn share-btn" type="button" hidden>Share result</button>
        <p id="joined-hint" class="joined-hint">You're in — watch the TV!</p>
      </div>

      <p id="status">Loading…</p>
    </main>
    <script type="module" src="/src/player.js"></script>
  </body>
</html>
