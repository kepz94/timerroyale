<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale — Controller</title>
    <meta name="theme-color" content="#050807" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .host-config { max-width: 22rem; margin: 1rem auto 0; text-align: left; }
      .hc-title { font-size: .85rem; letter-spacing: .08em; text-transform: uppercase;
        color: #7e967f; margin: .9rem 0 .4rem; }
      .hc-row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
      .hc-toggle { opacity: .55; }
      .hc-toggle.hc-on { opacity: 1; outline: 2px solid #22c55e; }
      .hc-count { font-size: 1.6rem; font-weight: 800; min-width: 2rem; text-align: center; }
      .hc-start { width: 100%; margin-top: 1rem; font-size: 1.2rem; }
      .hc-msg { color: #f0b429; min-height: 1.2em; }
      #hc-pve { display: flex; flex-direction: column; gap: .5rem; }
      .dpad { display: grid; grid-template-columns: repeat(3, 4.5rem); grid-auto-rows: 4.5rem;
        gap: 0.5rem; justify-content: center; margin: 1.2rem auto; }
      .dpad-btn { font-size: 1.4rem; border-radius: 0.7rem; border: 1px solid #22c55e;
        background: #0d1f14; color: #4ade80; touch-action: manipulation; }
      .dpad-btn:active { background: #12321c; }
      .dpad .up { grid-column: 2; grid-row: 1; } .dpad .left { grid-column: 1; grid-row: 2; }
      .dpad .right { grid-column: 3; grid-row: 2; } .dpad .down { grid-column: 2; grid-row: 3; }
      .dpad .back { grid-column: 1 / 2; grid-row: 4; font-size: 1rem; }
      .dpad .select { grid-column: 2 / 4; grid-row: 4; background: #12321c; font-size: 1rem; }

      /* Reconnect — always reachable if the controller freezes */
      #reconnect-btn { position: fixed; top: .6rem; right: .6rem; z-index: 60;
        background: #12321c; color: #4ade80; border: 1px solid #22c55e; border-radius: .5rem;
        font-size: .85rem; padding: .4rem .7rem; }
      /* Bigger, readable status + a real result panel (no more "just a button") */
      .turn-banner { font-size: 1.3rem; line-height: 1.3; }
      #result-panel { margin: 1.1rem auto 0; max-width: 22rem; background: #121c14;
        border-radius: 14px; padding: 1rem 1.2rem; }
      #result-panel .res-title { font-size: 1.5rem; font-weight: 800; margin-bottom: .6rem; }
      #result-panel .res-row { font-size: 1.2rem; padding: .4rem 0; display: flex;
        justify-content: space-between; gap: 1rem; border-top: 1px solid #1e2b20; }
      #result-panel .res-row:first-of-type { border-top: none; }
      #result-panel .res-row.me { color: #4ade80; font-weight: 800; }
      #result-panel .res-sub { color: #7e967f; margin-top: .3rem; }

      /* TR-59: the round target, amber LED like the TV board */
      #phone-target { margin: .6rem auto 0; }
      #phone-target .target-label { color: var(--warn); }
      .phone-target-digits { font-size: clamp(3rem, 19vw, 5.5rem); line-height: 1;
        color: var(--warn); text-shadow: var(--led-glow-warn); }

      /* Guess Timer numeric keypad */
      #guess-panel { margin: 1rem auto 0; max-width: 20rem; }
      #guess-phone-status { font-size: 1.15rem; color: #f0b429; margin-bottom: .6rem; }
      .guess-display { font-size: 3rem; font-weight: 800; font-variant-numeric: tabular-nums;
        background: #121c14; border-radius: 12px; padding: .8rem 1rem; margin-bottom: .8rem; }
      .guess-display .gd-unit { font-size: 1.4rem; color: #7e967f; }
      .guess-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
      .guess-keys button { font-size: 1.8rem; padding: .9rem 0; border-radius: 10px;
        border: 1px solid #22c55e; background: #0d1f14; color: #e9f6ec; touch-action: manipulation; }
      .guess-keys button:active { background: #12321c; }
      #guess-submit { margin-top: .8rem; width: 100%; font-size: 1.3rem; }
    </style>
  </head>
  <body class="player">
    <button id="reconnect-btn" type="button" title="Reload if the screen freezes">⟳ Reconnect</button>
    <div id="account-chip" class="account-chip">
      <button id="auth-btn" class="join-btn auth-btn" type="button" hidden>Sign in with Google</button>
      <button id="auth-name" class="auth-name" type="button" hidden></button>
      <button id="signout-btn" class="auth-signout" type="button" hidden>Sign out</button>
    </div>
    <main id="app">
      <h1>TimerRoyale</h1>
      <p id="room-banner" class="subtitle"></p>
      <form id="join-form" class="join-form" hidden>
        <label for="name-input" class="join-label">Your name</label>
        <input id="name-input" class="name-input" type="text" maxlength="16"
               autocomplete="off" autocapitalize="words" placeholder="e.g. Kepu" />
        <button id="join-btn" class="join-btn" type="submit">Join game</button>
        <p id="join-error" class="join-error" role="alert"></p>
      </form>
      <div id="joined-panel" class="joined-panel" hidden>
        <p id="joined-name" class="joined-name"></p>
        <p id="turn-banner" class="turn-banner"></p>
        <!-- TR-59: active players face AWAY from the TV — the target lives here -->
        <div id="phone-target" hidden>
          <p class="target-label">🎯 Target</p>
          <p id="phone-target-digits" class="timer-digits phone-target-digits">--<span class="timer-unit">s</span></p>
        </div>
        <button id="big-press" class="big-btn" type="button" hidden aria-label="Press"><span id="big-press-label">TAP TO START</span></button>
        <div id="result-panel" hidden aria-live="polite"></div>
        <div id="guess-panel" hidden>
          <p id="guess-phone-status"></p>
          <div id="guess-display" class="guess-display">0<span class="gd-unit">s</span></div>
          <div id="guess-keys" class="guess-keys">
            <button type="button" data-k="1">1</button>
            <button type="button" data-k="2">2</button>
            <button type="button" data-k="3">3</button>
            <button type="button" data-k="4">4</button>
            <button type="button" data-k="5">5</button>
            <button type="button" data-k="6">6</button>
            <button type="button" data-k="7">7</button>
            <button type="button" data-k="8">8</button>
            <button type="button" data-k="9">9</button>
            <button type="button" data-k=".">.</button>
            <button type="button" data-k="0">0</button>
            <button type="button" data-k="back">⌫</button>
          </div>
          <button id="guess-submit" class="join-btn" type="button">Lock in 🔒</button>
        </div>
        <button id="next-round-btn" class="join-btn" type="button" hidden>Next ▶</button>
        <section id="draft-panel" hidden aria-label="Team draft">
          <p id="draft-pool-label" class="players-label" hidden>Your pick — tap a player:</p>
          <div id="draft-pool" class="menu"></div>
          <form id="draft-name-form" class="join-form" hidden>
            <input id="draft-name-input" class="name-input" type="text" maxlength="16" autocomplete="off" placeholder="Team name" />
            <button class="join-btn" type="submit">Set name</button>
          </form>
          <!-- Curated logo pool (Stage 3a) — mirrors LOGOS in src/draft.js -->
          <div id="draft-emoji" class="menu" hidden>
            <button class="join-btn emoji-btn" type="button">🦅</button>
            <button class="join-btn emoji-btn" type="button">⚡</button>
            <button class="join-btn emoji-btn" type="button">🐉</button>
            <button class="join-btn emoji-btn" type="button">🦈</button>
            <button class="join-btn emoji-btn" type="button">👑</button>
            <button class="join-btn emoji-btn" type="button">🚀</button>
            <button class="join-btn emoji-btn" type="button">🌟</button>
            <button class="join-btn emoji-btn" type="button">💀</button>
            <button class="join-btn emoji-btn" type="button">🔥</button>
            <button class="join-btn emoji-btn" type="button">🐺</button>
            <button class="join-btn emoji-btn" type="button">🎯</button>
            <button class="join-btn emoji-btn" type="button">🧊</button>
          </div>
          <button id="draft-start-btn" class="join-btn" type="button" hidden>Start Tournament ▶</button>
        </section>
        <!-- Stage 3b (TR-58): the rematch menu — host phone only -->
        <section id="endnight" hidden aria-label="Rematch menu">
          <button class="join-btn" data-en="rematch" type="button">🔁 Rematch — same teams</button>
          <button class="join-btn" data-en="draft" type="button">🎡 New Draft</button>
          <button class="join-btn" data-en="mode" type="button">🎛️ Change Mode</button>
          <button class="join-btn" data-en="end" type="button">🌙 End Night</button>
        </section>
        <div id="host-config" class="host-config" hidden aria-label="Host setup">
          <p class="hc-title">Game pool</p>
          <div class="hc-row">
            <button class="join-btn hc-toggle" data-pool="classic" type="button">Classic</button>
            <button class="join-btn hc-toggle" data-pool="hard" type="button">Hard</button>
            <button class="join-btn hc-toggle" data-pool="guess" type="button">Guess</button>
          </div>
          <p class="hc-title">Category</p>
          <div class="hc-row">
            <button class="join-btn hc-toggle" data-cat="pve" type="button">PvE Arcade</button>
            <button class="join-btn hc-toggle" data-cat="pvp" type="button">PvP</button>
            <button class="join-btn hc-toggle" data-cat="teams" type="button">Teams</button>
          </div>
          <div id="hc-pve" hidden>
            <button id="hc-pve-mode" class="join-btn" type="button"></button>
            <button id="hc-koth-n" class="join-btn" type="button"></button>
          </div>
          <div id="hc-teams" class="hc-row" hidden>
            <button id="hc-teams-minus" class="join-btn" type="button">−</button>
            <span id="hc-teams-count" class="hc-count">2</span>
            <button id="hc-teams-plus" class="join-btn" type="button">+</button>
            <span class="hc-title" style="margin:0">teams</span>
          </div>
          <button id="hc-start" class="join-btn hc-start" type="button">▶ START GAME</button>
          <p id="hc-msg" class="hc-msg"></p>
        </div>
        <p class="players-label">In this lobby</p>
        <ul id="player-list" class="player-list"></ul>
      </div>
      <p id="status">Loading…</p>
    </main>
    <script type="module" src="/src/play.js"></script>
  </body>
</html>
