<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerRoyale — TV</title>
    <meta name="theme-color" content="#050807" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .tv-menu { max-width: 46rem; margin: 1.5rem auto; }
      .tv-menu ul { list-style: none; padding: 0; margin: 0; }
      .tv-menu li { padding: 0.7rem 1.2rem; margin: 0.35rem 0; font-size: clamp(1.4rem, 2.6vw, 2.4rem);
        font-family: "DSEG7-Classic", ui-monospace, monospace; letter-spacing: .04em;
        color: #7e967f; border-radius: 0.6rem; border: 2px solid transparent; white-space: pre; }
      .tv-menu li.focused { background: #0f2a1a; color: #4ade80; border-color: #22c55e;
        box-shadow: 0 0 18px rgba(34,197,94,0.35); }
      .tv-menu .tv-menu-msg { color: #f0b429; margin-top: 0.8rem; min-height: 1.2em; }

      /* ============================================================
         TR-52: TV-FIRST GAMEBOARD — sized for a couch, not a phone.
         Everything scales with the viewport so it fills a real TV.
         ============================================================ */
      body.host.playing { display: block; }
      body.host.playing #app { max-width: 100%; width: 100%; margin: 0; padding: 0; }
      body.host.playing h1, body.host.playing .subtitle { display: none; }

      #tv-game { display: grid; gap: 1vh; width: 100%; min-height: 100vh;
        align-content: center; justify-items: center; padding: 2vh 3vw; box-sizing: border-box; }
      #tv-match-banner { font-size: clamp(1.3rem, 2.6vw, 3.2rem); font-weight: 800; color: var(--accent);
        text-transform: uppercase; letter-spacing: .1em; max-width: 94vw; line-height: 1.15; }
      #tv-game .target-label { font-size: clamp(1rem, 1.8vw, 1.8rem); letter-spacing: .25em; }
      #tv-game #tv-target, #tv-game .timer-digits { font-size: clamp(4rem, 13vw, 15rem); line-height: .95; }
      .timer-unit { font-size: 0.35em; }

      /* Ledger dots */
      .tv-ledger { display: flex; justify-content: center; gap: clamp(1.5rem, 5vw, 6rem); flex-wrap: wrap; }
      .tv-ledger .team { display: grid; justify-items: center; gap: .3rem; }
      .tv-ledger .team .name { font-size: clamp(1rem, 2vw, 2.2rem); color: var(--text-dim);
        text-transform: uppercase; letter-spacing: .12em; }
      .tv-ledger .team .dot-strip { font-size: clamp(2.2rem, 4.6vw, 5rem); letter-spacing: .12em; }
      .tv-turn { font-size: clamp(1.1rem, 2.2vw, 2.4rem); text-transform: uppercase;
        letter-spacing: .22em; color: var(--text-dim); }

      /* Reveal screen */
      .tv-state { display: grid; gap: 1.2vh; justify-items: center; width: 100%; }
      .reveal-head { font-size: clamp(2.2rem, 5vw, 5rem); font-weight: 800; letter-spacing: .12em;
        color: var(--accent); text-transform: uppercase; max-width: 94vw; }
      .reveal-sub { font-size: clamp(1rem, 2vw, 2rem); color: var(--text-dim);
        letter-spacing: .22em; text-transform: uppercase; }
      .reveal-cards { display: flex; justify-content: center; gap: clamp(1.5rem, 4vw, 4rem); flex-wrap: wrap; }
      .reveal-card { background: var(--surface-raised); border-radius: var(--radius);
        padding: clamp(.9rem, 2.4vh, 2.4rem) clamp(1.6rem, 4vw, 4.5rem);
        min-width: clamp(12rem, 24vw, 30rem); border: 5px solid transparent; }
      .reveal-card .rc-team { font-size: clamp(1rem, 2vw, 2.2rem); color: var(--text-dim);
        text-transform: uppercase; letter-spacing: .16em; }
      .reveal-card .rc-name { font-weight: 800; font-size: clamp(1.5rem, 3.2vw, 3.2rem); margin: .25rem 0 .4rem; }
      .reveal-card .rc-time { font-size: clamp(3.2rem, 9vw, 9.5rem); font-weight: 800;
        font-variant-numeric: tabular-nums; line-height: 1; }
      .reveal-card .rc-dev { font-size: clamp(1rem, 2.2vw, 2.2rem); color: var(--text-dim);
        margin-top: .35rem; letter-spacing: .05em; }
      .reveal-card.win { border-color: var(--win); box-shadow: 0 0 40px rgba(74,222,128,.4); }
      .reveal-card.clutch { border-color: #f0b429; box-shadow: 0 0 48px rgba(240,180,41,.55);
        animation: clutchPulse .8s ease-in-out infinite alternate; }
      .reveal-card.dnf { opacity: .55; animation: shatter .5s ease-out; }
      .reveal-card.dnf .rc-time { color: var(--state-eliminated); }
      @keyframes clutchPulse { from { transform: scale(1); } to { transform: scale(1.05); } }
      @keyframes shatter { 0% { transform: translateX(0) rotate(0); }
        20% { transform: translateX(-10px) rotate(-2.5deg); }
        45% { transform: translateX(9px) rotate(2deg); }
        70% { transform: translateX(-4px) rotate(-1deg); }
        100% { transform: translateX(0) rotate(0); } }
      .reveal-winner { font-size: clamp(1.9rem, 4.4vw, 4.6rem); font-weight: 800; color: var(--win);
        letter-spacing: .03em; max-width: 94vw; }
      .reveal-winner.clutch { color: #f0b429; }

      /* Live status rows */
      #tv-round-rows.round-rows { max-width: min(56rem, 80vw); gap: clamp(.5rem, 1vh, 1rem); }
      #tv-game .round-row { font-size: clamp(1.4rem, 3vw, 3rem);
        padding: clamp(.6rem, 1.4vh, 1.4rem) clamp(1.2rem, 2.5vw, 2.5rem); }
      #tv-game .deviation { font-size: clamp(1rem, 2.1vw, 2.1rem); }
      #tv-game-msg.game-msg { font-size: clamp(1.4rem, 3vw, 3rem); }
      #tv-game-msg.game-msg.final { font-size: clamp(2.4rem, 5.5vw, 5.5rem); }
      .rotation-banner { color: #f0b429; font-weight: 700; letter-spacing: .03em;
        font-size: clamp(1.3rem, 2.8vw, 2.8rem); }

      /* Hard Classic screen */
      #hard-target { font-size: clamp(3.5rem, 10vw, 11rem); font-weight: 800;
        font-variant-numeric: tabular-nums; color: var(--text); line-height: 1; }
      #hard-zone { color: var(--text-dim); font-size: clamp(1rem, 2.2vw, 2.2rem);
        letter-spacing: .1em; text-transform: uppercase; }
      #hard-history { max-width: min(56rem, 80vw); }
      #tv-game .round-row.hit { border-left: 5px solid var(--win); color: var(--win); }
      #tv-game .round-row.dnf { border-left: 5px solid var(--danger); }

      /* Tournament bracket tree — big, to emphasize the games */
      .tv-bracket { display: flex; gap: clamp(1.5rem, 4.5vw, 5rem); justify-content: center;
        align-items: center; flex-wrap: wrap; margin: 2vh auto; width: 100%; }
      .bkt-col { display: flex; flex-direction: column; gap: clamp(1.2rem, 3vh, 3rem); justify-content: center; }
      .bkt-col-head { font-size: clamp(1.3rem, 2.6vw, 2.8rem); color: var(--text-dim);
        text-transform: uppercase; letter-spacing: .15em; text-align: center; margin-bottom: .4rem; }
      .bkt-match { background: var(--surface-raised); border-radius: var(--radius);
        padding: clamp(1rem, 2.2vh, 2.2rem) clamp(1.4rem, 2.6vw, 2.8rem);
        min-width: clamp(14rem, 27vw, 36rem); border-left: 8px solid transparent; }
      .bkt-match.current { border-left-color: #f0b429; box-shadow: 0 0 30px rgba(240,180,41,.4); }
      .bkt-slot { display: flex; justify-content: space-between; gap: 1.2rem;
        font-size: clamp(1.7rem, 3.4vw, 3.8rem); padding: .35rem 0; }
      .bkt-slot.winner { color: var(--win); font-weight: 800; }
      .bkt-slot .games { font-variant-numeric: tabular-nums; color: var(--text-dim); }
      .bkt-champ { text-align: center; }
      .bkt-champ .lbl { font-size: clamp(2.6rem, 5vw, 5.5rem); }
      .bkt-champ .who { font-size: clamp(2rem, 4vw, 4.4rem); font-weight: 800; color: var(--win); }

      /* Live spectator clocks (Team tournaments — active reps face away) */
      .tv-clocks { display: flex; justify-content: center; gap: clamp(2rem, 6vw, 7rem); flex-wrap: wrap; margin: 1vh 0; }
      .live-clock { background: var(--surface-raised); border-radius: var(--radius);
        padding: clamp(1rem, 2.5vh, 2.5rem) clamp(1.6rem, 4vw, 4.5rem);
        min-width: clamp(12rem, 24vw, 30rem); }
      .live-clock .lc-team { font-size: clamp(1rem, 2vw, 2.2rem); color: var(--text-dim);
        text-transform: uppercase; letter-spacing: .14em; }
      .live-clock .lc-name { font-size: clamp(1.5rem, 3.2vw, 3.2rem); font-weight: 800; margin: .2rem 0 .4rem; }
      .live-clock .lc-time { font-size: clamp(3.5rem, 10vw, 11rem); font-weight: 800;
        font-variant-numeric: tabular-nums; line-height: 1; color: var(--accent); }
      .live-clock.stopped .lc-time { color: var(--text); }
      .live-clock.dnf .lc-time { color: var(--danger); }
      #hard-clock { font-size: clamp(3rem, 9vw, 10rem); font-weight: 800;
        font-variant-numeric: tabular-nums; color: var(--accent); line-height: 1; min-height: 1em; }

      /* ============================================================
         TR-56 identity sweep (ADR-006): hero numerals get the seven-
         segment LED face with glow + ghost segments; words stay in the
         wide sans; more air between board sections (spacing pass).
         ============================================================ */
      #tv-game { gap: 2.4vh; padding: 4vh 4vw; }
      .tv-state { gap: 2.2vh; }
      .reveal-cards { margin: 1.2vh 0; }
      #tv-game #tv-target, #tv-game .timer-digits, #hard-target {
        font-family: var(--font-digits); font-weight: 400;
        color: var(--primary); text-shadow: var(--led-glow); }
      #tv-target .timer-unit, #hard-target .timer-unit, #guess-actual .timer-unit {
        font-family: var(--font); font-weight: 800; color: var(--text-dim);
        text-shadow: none; letter-spacing: 0; }
      .led-wrap { position: relative; display: inline-grid; }
      .led-wrap > * { grid-area: 1 / 1; }
      .led-ghost { opacity: var(--ghost-opacity); text-shadow: none; user-select: none; }
      #guess-actual .tv-words { font-size: .4em; color: var(--text-dim);
        display: block; text-shadow: none; }

      /* Reconnect — always reachable if a screen freezes */
      #tv-reconnect { position: fixed; top: 1rem; right: 1rem; z-index: 60;
        background: #12321c; color: #4ade80; border: 2px solid #22c55e; border-radius: .6rem;
        font-size: clamp(.9rem, 1.6vw, 1.4rem); padding: .5rem 1rem; cursor: pointer; opacity: .8; }
      #tv-reconnect:hover { opacity: 1; }
      #tv-sound { position: fixed; top: 1rem; left: 1rem; z-index: 60;
        background: #12321c; color: #f0b429; border: 2px solid #f0b429; border-radius: .6rem;
        font-size: clamp(.9rem, 1.6vw, 1.4rem); padding: .5rem 1rem; cursor: pointer; }

      /* Per-round mode-hint splash (TR-52: "Get close!" / "Hit EXACTLY!") */
      .tv-splash { position: fixed; inset: 0; z-index: 55; display: grid; place-items: center;
        background: rgba(5,8,7,.94); pointer-events: none; }
      .tv-splash.show .splash-inner { animation: splashPop .45s ease-out; }
      .splash-title { font-size: clamp(2rem, 5vw, 5rem); color: var(--text-dim);
        text-transform: uppercase; letter-spacing: .2em; font-weight: 800; }
      .splash-hint { font-size: clamp(3rem, 9vw, 10rem); color: #6ee7a0; font-weight: 800;
        margin-top: .4rem; text-shadow: 0 0 34px rgba(74,222,128,.55); }
      @keyframes splashPop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      /* Flash overlays (Guess start/stop cues, ready for wiring) */
      #tv-flash { position: fixed; inset: 0; pointer-events: none; opacity: 0; z-index: 50; }
      #tv-flash.green { background: rgba(34,197,94,.65); animation: flashOnce .4s ease-out; }
      #tv-flash.red { background: rgba(239,68,68,.65); animation: flashOnce .4s ease-out; }
      @keyframes flashOnce { 0% { opacity: .9; } 100% { opacity: 0; } }
    </style>
  </head>
  <body class="host">
    <button id="tv-reconnect" type="button" title="Reload if the screen freezes">⟳ Reconnect</button>
    <button id="tv-sound" type="button" title="Tap once to enable game sounds">🔊 Enable sound</button>
    <div id="tv-flash"></div>
    <div id="tv-splash" class="tv-splash" hidden>
      <div class="splash-inner">
        <p id="splash-title" class="splash-title"></p>
        <p id="splash-hint" class="splash-hint"></p>
      </div>
    </div>
    <main id="app" class="lobby">
      <h1>TimerRoyale</h1>
      <p class="subtitle">Scan to grab a controller</p>
      <section class="join-panel" aria-label="How to join">
        <div class="qr-card"><canvas id="qr"></canvas></div>
        <div class="room-info">
          <p class="room-label">Room code</p>
          <p id="room-code" class="room-code">····</p>
          <p id="join-url" class="join-url"></p>
        </div>
      </section>
      <section class="players-panel" aria-label="Players">
        <p class="players-label">Players (⭐ = signed-in host)</p>
        <ul id="player-list" class="player-list"></ul>
        <p id="players-empty" class="players-empty">No one has joined yet</p>
      </section>
      <section id="tv-menu" class="tv-menu" hidden aria-label="Host setup">
        <p class="players-label">Host setup — drive this with your phone remote</p>
        <ul id="tv-menu-list"></ul>
        <p id="tv-menu-msg" class="tv-menu-msg"></p>
      </section>
      <section id="tv-game" class="game-panel" hidden aria-label="Game">
        <p id="tv-match-banner" class="match-banner"></p>

        <div id="tv-ledger" class="tv-ledger" hidden></div>

        <div id="tv-active" class="tv-state">
          <p id="tv-target-label" class="target-label">Target</p>
          <p id="tv-target" class="timer-digits">0.0<span class="timer-unit">s</span></p>
          <p id="tv-turn" class="tv-turn" hidden></p>
          <div id="tv-clocks" class="tv-clocks" hidden></div>
          <ul id="tv-round-rows" class="round-rows"></ul>
        </div>

        <div id="tv-reveal" class="tv-state" hidden>
          <p id="reveal-head" class="reveal-head">Round Complete</p>
          <p id="reveal-sub" class="reveal-sub">Revealing recorded times…</p>
          <div id="reveal-cards" class="reveal-cards"></div>
          <p id="reveal-winner" class="reveal-winner"></p>
        </div>

        <div id="tv-hard" class="tv-state" hidden>
          <p id="hard-head" class="reveal-head"></p>
          <p id="hard-sub" class="reveal-sub"></p>
          <p id="hard-target" class="timer-digits"></p>
          <p id="hard-clock" hidden></p>
          <p id="hard-zone" class="rc-dev"></p>
          <ul id="hard-history" class="round-rows"></ul>
          <p id="hard-winner" class="reveal-winner"></p>
          <p id="hard-representing" class="rotation-banner"></p>
        </div>

        <div id="tv-guess" class="tv-state" hidden>
          <p id="guess-head" class="reveal-head"></p>
          <p id="guess-actual" class="timer-digits" hidden></p>
          <div id="guess-cards" class="reveal-cards"></div>
          <p id="guess-winner" class="reveal-winner"></p>
        </div>

        <div id="tv-bracket" class="tv-bracket" hidden></div>
        <ul id="tv-standings" class="standings"></ul>
        <p id="tv-rotation" class="rotation-banner"></p>
        <p id="tv-game-msg" class="game-msg"></p>
      </section>
      <p id="status">Creating room…</p>
    </main>
    <script type="module" src="/src/tv.js"></script>
  </body>
</html>
